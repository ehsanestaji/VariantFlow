name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install compatibility tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bcftools clang cmake libclang-dev make pkg-config tabix vcftools zlib1g-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run htslib clippy
        run: cargo clippy --features htslib-static --all-targets -- -D warnings
      - name: Run tests
        run: cargo test
      - name: Run htslib compatibility tests
        run: cargo test --features htslib-static
