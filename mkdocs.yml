site_name: VariantFlow
site_description: A selective-execution engine for post-calling VCF operations — filtering, VCFtools-style population summaries, and Parquet export on large cohorts.
site_url: https://ehsanestaji.github.io/VariantFlow/
repo_url: https://github.com/ehsanestaji/VariantFlow
repo_name: ehsanestaji/VariantFlow
docs_dir: docs

# Publish only the curated site pages; keep internal notes (submission
# packet, benchmark notes, etc.) out of the public documentation site.
exclude_docs: |
  /*
  !/index.md
  !/installation.md
  !/user-guide.md
  !/statistics.md
  !/tool-comparison.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide: user-guide.md
  - Statistics reference: statistics.md
  - Choosing the right tool: tool-comparison.md
